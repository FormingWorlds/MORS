name: MORS CI Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

# Push and PR CI: unit + smoke tiers only, targeting < 10 min wall. The
# integration and slow tiers run the real Baraffe / Spada evolution model
# and live in the scheduled nightly workflow `nightly.yml` instead, where
# coverage is measured and uploaded to Codecov.

permissions:
  contents: read

jobs:
  test:
    name: MORS-check
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Draft PRs run only ubuntu-latest / Python 3.12 for fast signal on the
      # gating steps (validator, linter, ratchet, one test pass). Non-draft
      # events (ready_for_review, push to main, workflow_dispatch) get the
      # full matrix.
      matrix:
        os: ${{ github.event.pull_request.draft == true && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}
        python-version: ${{ github.event.pull_request.draft == true && fromJSON('["3.12"]') || fromJSON('["3.11", "3.12", "3.13"]') }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        id: cache-virtualenv
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ env.pythonLocation }}-${{ hashFiles('pyproject.toml') }}

      - name: Build MORS
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[develop]"

      - name: Validate test markers
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        run: bash tools/validate_test_structure.sh

      - name: Run test-quality lint
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        run: python tools/check_test_quality.py --check

      - name: Pre-flight fail_under ratchet check
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          # Reject PRs that lower [tool.coverage.report] fail_under below the
          # 90% PROTEUS-ecosystem ceiling. The floor is min(base, 90.0): a
          # one-time ratchet down to the ceiling is allowed, but any drop
          # below the base value is blocked so the gate cannot be weakened to
          # land an under-tested change.
          git fetch --no-tags --depth=1 origin "$BASE_REF" || true
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import tomllib

          base_ref = os.environ.get('BASE_REF', 'main')
          out = subprocess.run(
              ['git', 'show', f'origin/{base_ref}:pyproject.toml'],
              capture_output=True,
              text=True,
              check=False,
          )
          if out.returncode != 0:
              print(f'Could not read pyproject.toml from origin/{base_ref}; skipping check.')
              sys.exit(0)

          base = tomllib.loads(out.stdout)
          head = tomllib.loads(pathlib.Path('pyproject.toml').read_text())

          ECOSYSTEM_CEILING = 90.0

          # Both coverage gates are one-way: the full nightly gate and the fast
          # PR gate. Each may ratchet down to the 90% ecosystem ceiling but not
          # below its base value, and may not be raised above 90%.
          GATES = {
              'full [tool.coverage.report]': ('coverage', 'report'),
              'fast [tool.mors.coverage_fast]': ('mors', 'coverage_fast'),
          }

          def fail_under(d, keypath):
              try:
                  node = d['tool'][keypath[0]][keypath[1]]
                  return float(node['fail_under'])
              except (KeyError, TypeError):
                  return None

          failed = False
          for label, keypath in GATES.items():
              base_v = fail_under(base, keypath)
              head_v = fail_under(head, keypath)
              print(f'{label} fail_under: base={base_v} head={head_v}')

              # Base has no gate yet: the PR that introduces it is allowed.
              if base_v is None:
                  print(f'  origin/{base_ref} has no {label} gate; nothing to enforce. PASS.')
                  continue
              # Head removed a gate the base had: that is a decrease.
              if head_v is None:
                  print(f'  ERROR: head removed the {label} gate (base had {base_v}).')
                  failed = True
                  continue
              floor = min(base_v, ECOSYSTEM_CEILING)
              if head_v < floor:
                  print(
                      f'  ERROR: {label} fail_under {head_v} < floor {floor} '
                      f'(base={base_v}, ceiling={ECOSYSTEM_CEILING}).'
                  )
                  failed = True
              elif head_v > ECOSYSTEM_CEILING:
                  print(
                      f'  ERROR: {label} fail_under {head_v} exceeds the '
                      f'{ECOSYSTEM_CEILING}% ceiling.'
                  )
                  failed = True
              else:
                  print(f'  OK: {label} fail_under {head_v} within [{floor}, {ECOSYSTEM_CEILING}].')

          sys.exit(1 if failed else 0)
          PY

      - name: Run unit + smoke tests
        run: |
          FAST_FAIL_UNDER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['mors']['coverage_fast']['fail_under'])")
          echo "Fast gate fail_under: ${FAST_FAIL_UNDER}%"
          pytest -m "(unit or smoke) and not skip and not slow and not integration" \
            --cov=mors \
            --cov-fail-under=${FAST_FAIL_UNDER}
