  - How-to guides:
      - Installation: How-to/installation.md
      - Calculate stellar evolution: How-to/evolution.md
      - Calculate cluster evolution: How-to/clusters.md
      - Using model percentiles for initial rotation: How-to/distribution_percentile.md
      - Setting custom simulation parameters: How-to/set_parameters.md
      - Find stellar rotation and activity quantities: How-to/activity_quantities.md
      - Find stellar quantities with stellar evolution tracks: How-to/track_quantities.md
      - Find habitable zone boundaries: How-to/habitablezone.md
      - Find stellar activity timelines: How-to/activity_timelines.md

  - Tutorials:
      - First run: Tutorials/first_run.md

  - Reference:
      - Publications and bibliography: Reference/publications.md
    
  - Community:
      - Contributing: CONTRIBUTING.md
      - Code of Conduct: CODE_OF_CONDUCT.md
      - Developers: https://proteus-framework.org/people
      - Contact: Community/contact.md

  - Source code: https://github.com/FormingWorlds/MORS
  - Issues page: https://github.com/FormingWorlds/MORS/issues

  - Other PROTEUS modules:
      - 🔗 PROTEUS:  https://proteus-framework.org/PROTEUS/
      - 🔗 JANUS: https://proteus-framework.org/JANUS/
      - 🔗 ZEPHYRUS: https://proteus-framework.org/ZEPHYRUS/
      - 🔗 CALLIOPE: https://proteus-framework.org/CALLIOPE/
      - 🔗 AGNI: https://www.h-nicholls.space/AGNI/
      - 🔗 Obliqua: https://proteus-framework.org/Obliqua/
      - 🔗 VULCAN: https://proteus-framework.org/VULCAN/
      - 🔗 Zalmoxis: https://proteus-framework.org/Zalmoxis/
      - 🔗 Aragog: https://proteus-framework.org/aragog/
      - 🔗 SPIDER:  https://proteus-framework.org/SPIDER/
      - 🔗 Atmodeller: https://atmodeller.readthedocs.io/en/latest/
      - 🔗 FastChem: https://newstrangeworlds.github.io/FastChem/
      - 🔗 PLATON: https://platon.readthedocs.io/en/latest/

theme:
  name: material
  custom_dir: docs/overrides
  features:
  - content.code.copy
  - navigation.expand

  # Default assets (used unless overridden per palette below)
  favicon: assets/PROTEUS_black_on_white_logo_only.png
  logo: assets/PROTEUS_white_on_black.png

  palette:
    # Auto: follow system preference (and show a toggle)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      favicon: assets/PROTEUS_black_on_white_logo_only.png
      logo: assets/PROTEUS_white_on_black.png
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      favicon: assets/PROTEUS_white_on_black_logo_only.png
      logo: assets/PROTEUS_white_on_black.png
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css
 
markdown_extensions:
  - admonition
  - attr_list
  - markdown_include.include:
      base_path: docs
  - pymdownx.extra
  - pymdownx.arithmatex:
      generic: true
  - footnotes

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/header-links.js

plugins:
- search
- mkdocstrings:
    # https://mkdocstrings.github.io/usage/
    handlers:
      python:
        paths: [src]
        inventories:
        - https://installer.readthedocs.io/en/stable/objects.inv
        - https://docs.python.org/3/objects.inv
        - https://numpy.org/doc/stable/objects.inv
        - https://docs.scipy.org/doc/scipy/objects.inv
        - https://pandas.pydata.org/docs/objects.inv
        - https://matplotlib.org/stable/objects.inv
        options:
          docstring_style: numpy
          docstring_options:
            ignore_init_summary: yes
          show_submodules: no
          show_source: true
          show_symbol_type_heading: True
          show_root_heading: true
          show_root_toc_entry: true
          show_docstring_attributes: true
          show_root_full_path: false
          docstring_section_style: list
          members_order: alphabetical
          merge_init_into_class: yes
          filters: ["!^_"]

watch:
  - src/
  - docs/
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
