# Datasets consumed by MORS, fetched through fwl-io.
#
# One TOML table per dataset. The dotted table key is the dataset location
# below FWL_DATA, so [star.tracks.baraffe_2015] resolves into
# star/tracks/baraffe_2015 and the location cannot drift from the key. Each
# dataset has a committed registry file next to this manifest, named
# <dotted-key>.registry.txt, generated by:  fwl-io sync <this file>
#
# Only the Baraffe tracks are declared here. The Spada grid is a single
# tarball and still comes down the legacy Zenodo/OSF path in data.py.

[star.tracks.baraffe_2015]
name = "Baraffe et al. (2015) stellar evolution tracks (BHAC15)"
zenodo = "10.5281/zenodo.15729114"
required_by = ["mors"]
