# Datasets consumed by MORS, fetched through fwl-io.
#
# One TOML table per dataset, identified by its "subdir" key. Each dataset
# has a committed registry file next to this manifest, named
# <dotted-key>.registry.txt, generated by:  fwl-io sync <this file>
#
# Only the Baraffe tracks are declared here. The Spada grid is a single
# tarball that is extracted after download; it stays on the legacy download
# path until fwl-io gains archive extraction.

[star.tracks.baraffe_2015]
name = "Baraffe et al. (2015) stellar evolution tracks (BHAC15)"
subdir = "star/tracks/baraffe_2015"
zenodo = "10.5281/zenodo.15729114"
required_by = ["mors"]
